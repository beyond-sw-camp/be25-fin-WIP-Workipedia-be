spring:
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:mariadb://localhost:${MARIADB_PORT:3306}/${MARIADB_TEST_DATABASE:workipedia_test}
    driver-class-name: org.mariadb.jdbc.Driver
    username: ${MARIADB_USER:workipedia}
    password: ${MARIADB_PASSWORD:workipedia}


  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: ${TEST_JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true

ai:
  base-url: http://localhost:8000
  timeout:
    routing-ms: 5000
    chatbot-ms: 30000

storage:
  provider: r2
  bucket: test-bucket
  public-url: https://test.example.com
  r2:
    access-key: test-access-key
    secret-key: test-secret-key
    account-id: test-account-id

tool:
  allowed-hosts: hr.example.com
  db:
    datasources:
      workipediaReadonly:
        url: jdbc:mariadb://localhost:${MARIADB_PORT:3306}/${MARIADB_TEST_DATABASE:workipedia_test}
        username: ${MARIADB_USER:workipedia}
        password: ${MARIADB_PASSWORD:workipedia}

internal:
  api-key: test-internal-api-key
