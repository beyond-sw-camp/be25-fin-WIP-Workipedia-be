spring:
  datasource:
    url: jdbc:mariadb://localhost:${MARIADB_PORT:3306}/${MARIADB_DATABASE:workipedia}
    driver-class-name: org.mariadb.jdbc.Driver
    username: ${MARIADB_USER:wip}
    password: ${MARIADB_PASSWORD:}

  data:
    redis:
      host: localhost
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: ${SPRING_JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true

  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}

app:
  jwt:
    # JWT_SECRET은 토큰 서명에 사용하는 민감값이므로 로컬 .env에 설정하고 Git에 커밋하지 않습니다.
    # Access Token 기본 만료 시간은 30분, Refresh Token 기본 만료 기간은 14일입니다.
    # 만료 시간을 변경해야 하면 .env에서 JWT_ACCESS_TOKEN_EXPIRATION, JWT_REFRESH_TOKEN_EXPIRATION 값을 수정합니다.
    secret: ${JWT_SECRET}
    access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:30m}
    refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:14d}

  mail:
    # 로컬 테스트에서는 Gmail SMTP로 인증코드를 발송합니다.
    # 실제 Gmail 계정과 앱 비밀번호는 .env에 설정하고 Git에 커밋하지 않습니다.
    # SPRING_MAIL_PASSWORD에는 Gmail 로그인 비밀번호가 아니라 Google 계정에서 발급한 앱 비밀번호를 입력합니다.
    sender: ${APP_MAIL_SENDER:smtp}
