spring:
  application:
    name: Workipedia

  profiles:
    default: local

  config:
    import: optional:file:.env[.properties]

  flyway:
    enabled: true

  output:
    ansi:
      enabled: always

logging:
  level:
    '[org.springframework.web]': info
    '[org.springframework.security]': info
    '[org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver]': error
    '[org.mariadb.jdbc.client.impl]': info
    '[org.springframework.data.redis]': info
    '[io.lettuce.core]': info

management:
  health:
    mail:
      enabled: false

  endpoints:
    web:
      exposure:
        include: health,info,metrics

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: Workipedia

infra:
  esg:
    region: ${AWS_REGION:ap-northeast-2}
    carbon:
      emission-factor-kg-per-kwh: 0.478
      pue: 1.135
      memory-energy-kwh-per-gb-hour: 0.000392
      min-watts: 0.74
      max-watts: 3.5
    thresholds:
      avg-cpu-percent: 20.0
      max-cpu-percent: 50.0
    instance-specs:
      t3.medium:
        v-cpu: 2
        memory-gb: 4
      t3.large:
        v-cpu: 2
        memory-gb: 8
    downsize-map:
      t3.large: t3.medium
    resources:
      - name: workipedia-be
        instance-id: ${INFRA_ESG_BE_INSTANCE_ID:}
        role: Backend
        instance-type: t3.large
      - name: workipedia-ai
        instance-id: ${INFRA_ESG_AI_INSTANCE_ID:}
        role: AI Server
        instance-type: t3.large
      - name: workipedia-qdrant
        instance-id: ${INFRA_ESG_QDRANT_INSTANCE_ID:}
        role: Vector DB
        instance-type: t3.medium

aws:
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
