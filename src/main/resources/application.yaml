spring:
  application:
    name: Workipedia

  profiles:
    default: local

  config:
    import: optional:file:.env[.properties]

  flyway:
    enabled: true

  logging:
    level:
      '[org.springframework.web]': info
      '[org.springframework.security]': info
      '[org.mariadb.jdbc.client.impl]': info
      '[org.springframework.data.redis]': info
      '[io.lettuce.core]': info

  management:
    endpoints:
      web:
        exposure:
          include: health,info,metrics

    endpoint:
      health:
        show-details: always

    metrics:
      tags:
        application: Workipedia

app:
  mail:
    sender: ${APP_MAIL_SENDER:console}
