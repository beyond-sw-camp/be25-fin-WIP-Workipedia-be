spring:
  application:
    name: Workipedia

  profiles:
    default: local

  config:
    import: optional:file:.env[.properties]

  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}

  flyway:
    enabled: true

  logging:
    level:
      '[org.springframework.web]': info
      '[org.springframework.security]': info
      '[org.mariadb.jdbc.client.impl]': info
      '[org.springframework.data.redis]': info
      '[io.lettuce.core]': info

management:
  health:
    mail:
      enabled: false

  endpoints:
    web:
      exposure:
        include: health,info,metrics

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: Workipedia

app:
  mail:
    # 기본 발송 방식은 Gmail SMTP입니다.
    # 로컬 테스트 시 .env에 Gmail 계정과 앱 비밀번호를 설정해야 실제 인증코드가 발송됩니다.
    sender: ${APP_MAIL_SENDER:smtp}
