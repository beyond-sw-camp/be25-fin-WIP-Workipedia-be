spring:
  application:
    name: Workipedia

  profiles:
    default: local

  config:
    import: optional:file:.env[.properties]

  flyway:
    enabled: true

  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:20MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:25MB}

logging:
  level:
    '[org.springframework.web]': info
    '[org.springframework.security]': info
    '[org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver]': error
    '[org.mariadb.jdbc.client.impl]': info
    '[org.springframework.data.redis]': info
    '[io.lettuce.core]': info

management:
  health:
    mail:
      enabled: false

  endpoints:
    web:
      exposure:
        include: health,info,metrics

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: Workipedia

ai:
  base-url: ${AI_BASE_URL:http://localhost:8000}
  timeout:
    routing-ms: ${AI_TIMEOUT_ROUTING_MS:5000}
    chatbot-ms: ${AI_TIMEOUT_CHATBOT_MS:30000}

internal:
  api-key: ${INTERNAL_API_KEY}

tool:
  allowed-hosts: ${TOOL_ALLOWED_HOSTS:}
  db:
    allowed-datasources: ${TOOL_DB_ALLOWED_DATASOURCES:}
    datasources:
      workipediaReadonly:
        # DB Query Tool이 실제 사내 DB에 접속하는 정보라 internal.api-key와 같은 원칙을 적용한다 —
        # 운영에서 env var를 빠뜨리면 기본값으로 조용히 기동되지 않고 바로 실패해야 한다.
        # 로컬/테스트 기본값은 application-local.yaml/application-test.yaml에만 둔다.
        url: ${TOOL_DB_READONLY_URL}
        username: ${TOOL_DB_READONLY_USERNAME}
        password: ${TOOL_DB_READONLY_PASSWORD}
