services:
  mariadb:
    image: mariadb:11.4
    container_name: workipedia-mariadb
    restart: unless-stopped
    ports:
      - "${MARIADB_PORT:-3306}:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?MARIADB_ROOT_PASSWORD is required}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_TEST_DATABASE: ${MARIADB_TEST_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:?MARIADB_PASSWORD is required}
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - workipedia-mariadb-data:/var/lib/mysql
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: workipedia-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      TZ: ${TZ:-Asia/Seoul}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "--appendonly", "yes"]
    volumes:
      - workipedia-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    # Nori 한국어 분석기를 포함한 커스텀 이미지(docker/elasticsearch/Dockerfile)를 빌드해 사용한다.
    build:
      context: ./docker/elasticsearch
    image: workipedia-elasticsearch:8.18.8-nori
    container_name: workipedia-elasticsearch
    restart: unless-stopped
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - workipedia-elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"\\(green\\|yellow\\)\"'"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  workipedia-mariadb-data:
  workipedia-redis-data:
  workipedia-elasticsearch-data:
