name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/beyond-sw-camp/be25-fin-wip-workipedia-be
  ELASTICSEARCH_IMAGE_NAME: ghcr.io/beyond-sw-camp/be25-fin-wip-workipedia-be-elasticsearch

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Elasticsearch image
        uses: docker/build-push-action@v6
        with:
          context: docker/elasticsearch
          push: true
          tags: |
            ${{ env.ELASTICSEARCH_IMAGE_NAME }}:8.18.8
          cache-from: type=gha,scope=elasticsearch
          cache-to: type=gha,mode=max,scope=elasticsearch

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519_workipedia_deploy
          chmod 600 ~/.ssh/id_ed25519_workipedia_deploy
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Log in to GHCR on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          printf '%s' "$GHCR_PAT" | ssh \
            -i ~/.ssh/id_ed25519_workipedia_deploy \
            -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"

      - name: Deploy backend
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          BACKEND_IMAGE: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          ELASTICSEARCH_IMAGE: ${{ env.ELASTICSEARCH_IMAGE_NAME }}:8.18.8
        run: |
          ssh \
            -i ~/.ssh/id_ed25519_workipedia_deploy \
            -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "BACKEND_IMAGE='$BACKEND_IMAGE' ELASTICSEARCH_IMAGE='$ELASTICSEARCH_IMAGE' bash -s" <<'EOF'
          set -euo pipefail

          infra_dir="$HOME/apps/workipedia/Workipedia-infra"
          cd "$infra_dir"
          git pull --ff-only
          ./scripts/deploy.sh be

          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/actuator/health \
              | grep -q '"status":"UP"'; then
              docker image prune -f
              exit 0
            fi
            sleep 10
          done

          docker compose \
            --env-file be/.env \
            --file be/docker-compose.yml \
            logs --tail=200 backend
          exit 1
          EOF
