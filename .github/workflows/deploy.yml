name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/beyond-sw-camp/be25-fin-wip-workipedia-be

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Home Server
    needs: build
    runs-on:
      - self-hosted
      - Linux
      - X64
      - workipedia-be
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images
        env:
          BACKEND_IMAGE: ${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: |
          docker compose \
            --env-file /home/jin605/apps/workipedia/workipedia-be/.env \
            -f deploy/docker-compose.yml \
            pull

      - name: Deploy containers
        env:
          BACKEND_IMAGE: ${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: |
          docker compose \
            --env-file /home/jin605/apps/workipedia/workipedia-be/.env \
            -f deploy/docker-compose.yml \
            up -d --remove-orphans

      - name: Verify backend
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/actuator/health \
              | grep -q '"status":"UP"'; then
              echo "Backend is healthy"
              exit 0
            fi

            echo "Waiting for backend: ${attempt}/30"
            sleep 10
          done

          echo "Backend health check failed"

          docker compose \
            --env-file /home/jin605/apps/workipedia/workipedia-be/.env \
            -f deploy/docker-compose.yml \
            ps

          docker compose \
            --env-file /home/jin605/apps/workipedia/workipedia-be/.env \
            -f deploy/docker-compose.yml \
            logs --tail=200 backend

          exit 1

      - name: Remove unused images
        if: success()
        run: docker image prune -f