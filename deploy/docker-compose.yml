name: workipedia

services:
  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "healthcheck.sh",
          "--connect",
          "--innodb_initialized"
        ]
      interval: 10s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --appendonly
      - "yes"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9200/_cluster/health || exit 1"
        ]
      interval: 15s
      timeout: 5s
      retries: 20

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/beyond-sw-camp/be25-fin-wip-workipedia-be:latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      TZ: ${TZ:-Asia/Seoul}

      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/${MARIADB_DATABASE}
      SPRING_DATASOURCE_USERNAME: ${MARIADB_USER}
      SPRING_DATASOURCE_PASSWORD: ${MARIADB_PASSWORD}

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}

      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      SPRING_JPA_DDL_AUTO: validate

      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION:-12h}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION:-14d}

      APP_MAIL_SENDER: ${APP_MAIL_SENDER}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}

      STORAGE_PROVIDER: ${STORAGE_PROVIDER}
      STORAGE_BUCKET: ${STORAGE_BUCKET}
      STORAGE_PUBLIC_BASE_URL: ${STORAGE_PUBLIC_BASE_URL}

      R2_ACCESS_KEY: ${R2_ACCESS_KEY}
      R2_SECRET_KEY: ${R2_SECRET_KEY}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}

      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-unused}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-unused}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://localhost}

      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:-unused}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY:-unused}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}

    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sS -o /dev/null http://localhost:8080/actuator/health"
        ]
      interval: 15s
      timeout: 5s
      retries: 20

volumes:
  mariadb-data:
  redis-data:
  elasticsearch-data: